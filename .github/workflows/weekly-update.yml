name: Weekly Data Update

on:
  schedule:
    - cron: '0 2 * * 1'   # 매주 월요일 오전 11시 KST (UTC+9)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data collection
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python3 naver_trend_compare.py
          python3 naver_trend_subscribe.py

      - name: Fetch news events
        run: python3 fetch_events.py

      - name: Build chart HTML
        run: |
          python3 make_charts.py
          cp output/monthly_charts_$(date +%Y%m%d).html index.html

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: weekly data update $(date +%Y-%m-%d)"
          git push
